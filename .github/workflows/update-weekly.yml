name: Update weekly grocery ads

"on":
  workflow_dispatch:
  schedule:
    - cron: "30 10 * * 3"

permissions:
  contents: write

concurrency:
  group: grocery-weekly-update
  cancel-in-progress: false

jobs:
  update:
    name: Scrape and rebuild grocery data
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install project dependencies
        run: npm ci

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Validate code
        run: |
          npm run check
          npm test

      - name: Pull current weekly ads
        run: npm run scrape
        env:
          CI: "true"

      - name: Commit updated weekly data
        shell: bash
        run: |
          git config user.name "grocery-intelligence-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/
          if compgen -G "diagnostics/*.json" > /dev/null; then
            git add diagnostics/*.json
          fi
          if git diff --cached --quiet; then
            echo "No grocery data changes were produced."
          else
            git commit -m "Update weekly grocery ads $(date -u +%F)"
            git push
          fi

      - name: Upload scraper diagnostics on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: grocery-scraper-diagnostics
          path: diagnostics/
          if-no-files-found: ignore
          retention-days: 14
