name: Update weekly grocery ads
on:
  workflow_dispatch:
  schedule:
    - cron: '30 10 * * 3' # Wednesday 6:30 AM Eastern during daylight time
permissions:
  contents: write
jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm install
      - run: npx playwright install --with-deps chromium
      - run: npm test
      - run: npm run scrape
      - name: Commit updated data
        run: |
          git config user.name "grocery-intelligence-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data diagnostics/*.json
          git diff --cached --quiet || git commit -m "Update weekly ads $(date -u +%F)"
          git push
      - name: Upload diagnostics when the scraper fails
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: grocery-scraper-diagnostics
          path: diagnostics/
          retention-days: 14
